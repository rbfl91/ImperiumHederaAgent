<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Antenna -->
  <circle cx="32" cy="6" r="3" fill="#4a6fa5"/>
  <line x1="32" y1="9" x2="32" y2="18" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="10" y="18" width="44" height="34" rx="6" stroke="#1a2744" stroke-width="3" fill="none"/>
  <!-- Eyes -->
  <circle cx="24" cy="33" r="5" stroke="#1a2744" stroke-width="2.5" fill="none"/>
  <circle cx="24" cy="33" r="2" fill="#1a2744"/>
  <circle cx="40" cy="33" r="5" stroke="#1a2744" stroke-width="2.5" fill="none"/>
  <circle cx="40" cy="33" r="2" fill="#1a2744"/>
  <!-- Smile -->
  <path d="M22 42 C26 47 38 47 42 42" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Ears -->
  <rect x="3" y="28" width="7" height="14" rx="3" stroke="#1a2744" stroke-width="2.5" fill="none"/>
  <rect x="54" y="28" width="7" height="14" rx="3" stroke="#1a2744" stroke-width="2.5" fill="none"/>
  <!-- Body connector -->
  <rect x="28" y="52" width="8" height="4" rx="2" fill="#4a6fa5"/>
  <!-- Speech bubble -->
  <ellipse cx="52" cy="14" rx="9" ry="7" stroke="#4a6fa5" stroke-width="2.5" fill="none"/>
  <line x1="48" y1="16" x2="50" y2="16" stroke="#4a6fa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="13" x2="56" y2="13" stroke="#4a6fa5" stroke-width="2" stroke-linecap="round"/>
</svg>
